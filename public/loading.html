<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading Universe...</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
cursor:pointer;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#startText{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-family:Arial;
letter-spacing:3px;
opacity:0.7;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

</head>

<body>

<div id="startText">CLICK TO START UNIVERSE</div>

<canvas id="scene"></canvas>

<script>

/* ================================
OCEAN AMBIENT AUDIO
================================ */

let audioStarted=false
let audioCtx

function startAudio(){

if(audioStarted) return
audioStarted=true

document.getElementById("startText").style.display="none"

audioCtx = new (window.AudioContext || window.webkitAudioContext)()

/* MASTER GAIN (LOUDER FOR LAPTOP SPEAKERS) */

const master = audioCtx.createGain()
master.gain.value = 3.0
master.connect(audioCtx.destination)

/* ======================
OCEAN WAVE AMBIENCE
====================== */

const bufferSize = audioCtx.sampleRate * 4
const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate)
const data = buffer.getChannelData(0)

for(let i=0;i<bufferSize;i++){
data[i]=(Math.random()*2-1)
}

const noise = audioCtx.createBufferSource()
noise.buffer = buffer
noise.loop = true

const waveFilter = audioCtx.createBiquadFilter()
waveFilter.type="lowpass"
waveFilter.frequency.value=900

const waveGain = audioCtx.createGain()
waveGain.gain.value=0.001

noise.connect(waveFilter)
waveFilter.connect(waveGain)
waveGain.connect(master)

noise.start()

waveGain.gain.exponentialRampToValueAtTime(
0.8,
audioCtx.currentTime+3
)

/* ======================
SEA WIND
====================== */

const windOsc = audioCtx.createOscillator()
windOsc.type="sine"
windOsc.frequency.value=120

const windGain = audioCtx.createGain()
windGain.gain.value=0.001

windOsc.connect(windGain)
windGain.connect(master)

windOsc.start()

windGain.gain.exponentialRampToValueAtTime(
0.4,
audioCtx.currentTime+4
)

/* ======================
WAVE MOTION MODULATION
====================== */

setInterval(()=>{

waveFilter.frequency.value = 700 + Math.random()*500
windOsc.frequency.value = 90 + Math.random()*60

},3000)

}

window.addEventListener("click",startAudio)
window.addEventListener("touchstart",startAudio)


/* ================================
THREE JS UNIVERSE
================================ */

const canvas=document.getElementById("scene")

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=10

const renderer=new THREE.WebGLRenderer({
canvas:canvas,
alpha:true,
antialias:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

/* particles */

const particleCount=3000

const positions=new Float32Array(particleCount*3)
const velocities=new Float32Array(particleCount*3)
const colors=new Float32Array(particleCount*3)

for(let i=0;i<particleCount;i++){

let i3=i*3

positions[i3]=(Math.random()-0.5)*40
positions[i3+1]=(Math.random()-0.5)*40
positions[i3+2]=(Math.random()-0.5)*40

velocities[i3]=(Math.random()-0.5)*0.04
velocities[i3+1]=(Math.random()-0.5)*0.04
velocities[i3+2]=(Math.random()-0.5)*0.04

const color=new THREE.Color()
color.setHSL(Math.random(),1,0.6)

colors[i3]=color.r
colors[i3+1]=color.g
colors[i3+2]=color.b
}

const geometry=new THREE.BufferGeometry()

geometry.setAttribute(
"position",
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
"color",
new THREE.BufferAttribute(colors,3)
)

const material=new THREE.PointsMaterial({
size:0.08,
vertexColors:true,
transparent:true,
opacity:0.9,
blending:THREE.AdditiveBlending
})

const particles=new THREE.Points(geometry,material)

scene.add(particles)

/* connections */

const maxConnections=400
const linePositions=new Float32Array(maxConnections*6)

const lineGeometry=new THREE.BufferGeometry()

lineGeometry.setAttribute(
'position',
new THREE.BufferAttribute(linePositions,3)
)

const lineMaterial=new THREE.LineBasicMaterial({
color:0x00ffff,
transparent:true,
opacity:0.25
})

const lineSegments=new THREE.LineSegments(
lineGeometry,
lineMaterial
)

scene.add(lineSegments)

/* earth formation target */

const earthPositions=[]
const radius=6

for(let i=0;i<particleCount;i++){

let theta=Math.random()*Math.PI*2
let phi=Math.acos(2*Math.random()-1)

let x=radius*Math.sin(phi)*Math.cos(theta)
let y=radius*Math.sin(phi)*Math.sin(theta)
let z=radius*Math.cos(phi)

earthPositions.push(x,y,z)

}

/* animation */

let time=0
let attract=false
let redirectTriggered=false

function animate(){

requestAnimationFrame(animate)

time+=0.02

if(time>8) attract=true

const pos=geometry.attributes.position.array

for(let i=0;i<particleCount;i++){

let i3=i*3

let x=pos[i3]
let y=pos[i3+1]
let z=pos[i3+2]

if(!attract){

pos[i3]+=velocities[i3]+Math.sin(time+i)*0.01
pos[i3+1]+=velocities[i3+1]+Math.cos(time+i)*0.01
pos[i3+2]+=velocities[i3+2]

}else{

let tx=earthPositions[i3]
let ty=earthPositions[i3+1]
let tz=earthPositions[i3+2]

pos[i3]+=(tx-x)*0.04
pos[i3+1]+=(ty-y)*0.04
pos[i3+2]+=(tz-z)*0.04

}

}

geometry.attributes.position.needsUpdate=true

let connectionIndex=0

for(let i=0;i<particleCount;i+=6){

for(let j=i+6;j<particleCount;j+=6){

if(connectionIndex>=maxConnections) break

let dx=pos[i*3]-pos[j*3]
let dy=pos[i*3+1]-pos[j*3+1]
let dz=pos[i*3+2]-pos[j*3+2]

let dist=dx*dx+dy*dy+dz*dz

if(dist<2){

let idx=connectionIndex*6

linePositions[idx]=pos[i*3]
linePositions[idx+1]=pos[i*3+1]
linePositions[idx+2]=pos[i*3+2]

linePositions[idx+3]=pos[j*3]
linePositions[idx+4]=pos[j*3+1]
linePositions[idx+5]=pos[j*3+2]

connectionIndex++

}

}

}

lineGeometry.setDrawRange(0,connectionIndex*2)
lineGeometry.attributes.position.needsUpdate=true

if(attract){

particles.rotation.y+=0.004
particles.rotation.x+=0.001

}

/* redirect */

if(attract && time>18 && !redirectTriggered){

redirectTriggered=true

setTimeout(()=>{
window.location.href="index.html"
},2000)

}

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
