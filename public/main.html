<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSphare AI - Main</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Advanced Galaxy Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(138, 43, 226, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 70%, rgba(59, 130, 246, 0.3) 0%, transparent 40%),
                radial-gradient(ellipse at 40% 80%, rgba(239, 68, 68, 0.2) 0%, transparent 40%),
                radial-gradient(ellipse at 60% 20%, rgba(168, 85, 247, 0.2) 0%, transparent 40%),
                radial-gradient(ellipse at center, 
                    #0a0a0a 0%, 
                    #1a1a2e 30%, 
                    #16213e 50%, 
                    #0f3460 70%, 
                    #1a1a2e 100%);
            z-index: -4;
        }

        /* Cosmic Clouds Layer */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(138, 43, 226, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 85% 75%, rgba(59, 130, 246, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 45% 85%, rgba(239, 68, 68, 0.1) 0%, transparent 60%),
                radial-gradient(circle at 65% 15%, rgba(168, 85, 247, 0.1) 0%, transparent 60%),
                radial-gradient(circle at 35% 50%, rgba(34, 197, 94, 0.08) 0%, transparent 60%),
                radial-gradient(circle at 75% 35%, rgba(251, 146, 60, 0.08) 0%, transparent 60%);
            z-index: -3;
            animation: cosmicPulse 15s infinite alternate;
        }

        /* Aurora Borealis Effect */
        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.6;
            background: 
                linear-gradient(45deg, transparent 30%, rgba(0, 255, 255, 0.1) 50%, transparent 70%),
                linear-gradient(-45deg, transparent 30%, rgba(255, 0, 255, 0.1) 50%, transparent 70%),
                linear-gradient(90deg, transparent 40%, rgba(0, 255, 0, 0.05) 60%, transparent 80%);
            animation: auroraFlow 25s infinite linear;
        }

        /* Particle Field */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 20s infinite;
        }

        /* Energy Grid */
        .energy-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridPulse 10s infinite alternate;
        }

        /* 3D Galaxy */
        .galaxy-3d {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 1200px;
            height: 1200px;
            transform: translate(-50%, -50%) rotateX(60deg);
            z-index: -2;
            transform-style: preserve-3d;
            animation: galaxyRotate 60s infinite linear;
        }

        .galaxy-arm {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .galaxy-arm:nth-child(1) {
            transform: rotateZ(0deg);
        }

        .galaxy-arm:nth-child(2) {
            transform: rotateZ(72deg);
        }

        .galaxy-arm:nth-child(3) {
            transform: rotateZ(144deg);
        }

        .galaxy-arm:nth-child(4) {
            transform: rotateZ(216deg);
        }

        .galaxy-arm:nth-child(5) {
            transform: rotateZ(288deg);
        }

        .galaxy-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            animation: starTwinkle 3s infinite;
        }

        .galaxy-core {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(100, 149, 237, 0.8) 0%, rgba(100, 149, 237, 0.6) 40%, rgba(65, 105, 225, 0.4) 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(100, 149, 237, 0.6), 0 0 60px rgba(65, 105, 225, 0.4);
            animation: corePulse 4s infinite;
        }

        /* Stars Container */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        .star.white {
            background: white;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
        }

        .star.blue {
            background: #4FC3F7;
            box-shadow: 0 0 6px rgba(79, 195, 247, 0.8);
        }

        .star.yellow {
            background: #FFD700;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.8);
        }

        .star.red {
            background: #FF6B6B;
            box-shadow: 0 0 6px rgba(255, 107, 107, 0.8);
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: linear-gradient(45deg, transparent, white, transparent);
            animation: shoot 3s linear;
        }

        /* Pulsing Stars */
        .pulsing-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* Advanced Animations */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        @keyframes cosmicPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        @keyframes auroraFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            20% { opacity: 1; transform: translateY(80vh) scale(1); }
            80% { opacity: 1; transform: translateY(20vh) scale(1); }
            100% { opacity: 0; transform: translateY(0vh) scale(0); }
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0.03; }
            50% { opacity: 0.08; }
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
            100% { transform: translateX(300px) translateY(300px) rotate(45deg); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        @keyframes moveStars {
            from { transform: translateY(0px); }
            to { transform: translateY(-100vh); }
        }

        @keyframes galaxyRotate {
            from { transform: translate(-50%, -50%) rotateX(60deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateX(60deg) rotateZ(360deg); }
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        @keyframes corePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }
        
        .welcome-text {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rgbAnimation 4s ease infinite;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        @keyframes rgbAnimation {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #00ffff;
            margin-bottom: 40px;
            line-height: 1.6;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(0, 255, 255, 0.4);
        }
        
        .inventor-text {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }
        
        .get-started-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .get-started-btn:active {
            transform: translateY(0);
        }
        
        .icon-container {
            position: relative;
            margin-bottom: 30px;
            display: inline-block;
        }

        .sphere-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%) rotateX(75deg);
            border: 3px solid;
            border-color: #00ffff transparent #00ffff transparent;
            border-radius: 50%;
            animation: sphereRotate 4s linear infinite;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transform-style: preserve-3d;
        }

        .sphere-ring::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%) rotateY(75deg);
            border: 3px solid;
            border-color: transparent #ff00ff transparent #ff00ff;
            border-radius: 50%;
            animation: sphereRotate 3s linear infinite reverse;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            transform-style: preserve-3d;
        }

        .sphere-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120px;
            height: 120px;
            transform: translate(-50%, -50%) rotateZ(75deg);
            border: 3px solid;
            border-color: #ffff00 transparent #ffff00 transparent;
            border-radius: 50%;
            animation: sphereRotate 5s linear infinite;
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.6);
            transform-style: preserve-3d;
        }

        .icon {
            font-size: 4rem;
            color: #667eea;
            position: relative;
            z-index: 10;
            display: block;
            text-align: center;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes sphereRotate {
            from { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateX(75deg) rotateZ(360deg); }
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 20px;
                min-height: 100vh;
            }

            .welcome-text {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 25px;
                line-height: 1.4;
            }

            .inventor-text {
                font-size: 0.9rem;
                margin-bottom: 20px;
            }

            .icon {
                font-size: 3rem;
            }

            .icon-container {
                margin-bottom: 20px;
            }

            .sphere-ring,
            .sphere-ring::before,
            .sphere-ring::after {
                width: 80px;
                height: 80px;
            }

            .get-started-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }

            .galaxy-3d {
                width: 100vw;
                height: 100vw;
                max-width: 600px;
                max-height: 600px;
            }
        }

        @media (max-width: 480px) {
            .welcome-text {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.9rem;
                margin-bottom: 20px;
            }

            .inventor-text {
                font-size: 0.8rem;
            }

            .icon {
                font-size: 2.5rem;
            }

            .sphere-ring,
            .sphere-ring::before,
            .sphere-ring::after {
                width: 60px;
                height: 60px;
            }

            .get-started-btn {
                padding: 10px 25px;
                font-size: 0.9rem;
            }

            .galaxy-3d {
                width: 90vw;
                height: 90vw;
                max-width: 400px;
                max-height: 400px;
            }
        }

        @media (max-width: 360px) {
            .welcome-text {
                font-size: 1.3rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .icon {
                font-size: 2rem;
            }

            .sphere-ring,
            .sphere-ring::before,
            .sphere-ring::after {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Advanced Background Layers -->
    <div class="aurora"></div>
    <div class="energy-grid"></div>
    <div class="particles" id="particlesContainer"></div>
    <div class="stars" id="starsContainer"></div>
    
    <!-- 3D Galaxy -->
    <div class="galaxy-3d" id="galaxy3d">
        <div class="galaxy-arm" id="arm1"></div>
        <div class="galaxy-arm" id="arm2"></div>
        <div class="galaxy-arm" id="arm3"></div>
        <div class="galaxy-arm" id="arm4"></div>
        <div class="galaxy-arm" id="arm5"></div>
        <div class="galaxy-core"></div>
    </div>
    
    <!-- Main Content -->
    <div class="icon-container">
        <div class="sphere-ring"></div>
        <div class="icon">
            <i class="fas fa-heartbeat"></i>
        </div>
    </div>
    <h1 class="welcome-text">Welcome To MediSphare AI</h1>
    <p class="subtitle">Your comprehensive healthcare companion powered by artificial intelligence.<br>Take control of your health journey with personalized insights and intelligent recommendations.</p>
    <p class="inventor-text">Invented By - Abir Rakshit</p>
    <a href="login.html" class="get-started-btn">
        <i class="fas fa-arrow-right"></i> Get Started
    </a>

    <script>
        // Create advanced background effects
        function createStars() {
            const starsContainer = document.getElementById('starsContainer');
            
            // Create regular twinkling stars
            for (let i = 0; i < 100; i++) {
                createRegularStar(starsContainer);
            }
            
            // Create colored stars
            for (let i = 0; i < 30; i++) {
                createColoredStar(starsContainer);
            }
            
            // Create pulsing stars
            for (let i = 0; i < 15; i++) {
                createPulsingStar(starsContainer);
            }
            
            // Create shooting stars periodically
            setInterval(() => createShootingStar(starsContainer), 3000);
        }

        // Create particle field
        function createParticles() {
            const particlesContainer = document.getElementById('particlesContainer');
            const numberOfParticles = 50;
            
            for (let i = 0; i < numberOfParticles; i++) {
                createParticle(particlesContainer);
            }
        }

        // Create 3D Galaxy
        function create3DGalaxy() {
            const galaxy3d = document.getElementById('galaxy3d');
            const arms = [
                document.getElementById('arm1'),
                document.getElementById('arm2'),
                document.getElementById('arm3'),
                document.getElementById('arm4'),
                document.getElementById('arm5')
            ];
            
            // Create stars in each spiral arm
            arms.forEach((arm, armIndex) => {
                const starsPerArm = 30;
                
                for (let i = 0; i < starsPerArm; i++) {
                    createGalaxyStar(arm, armIndex, i, starsPerArm);
                }
            });
        }

        function createGalaxyStar(arm, armIndex, starIndex, totalStars) {
            const star = document.createElement('div');
            star.className = 'galaxy-star';
            
            // Calculate spiral position
            const angle = (starIndex / totalStars) * Math.PI * 2;
            const radius = 50 + (starIndex / totalStars) * 400; // Spiral from center outward for larger galaxy
            
            // Add some randomness for natural look
            const randomRadius = radius + (Math.random() - 0.5) * 30;
            const randomAngle = angle + (Math.random() - 0.5) * 0.3;
            
            // Convert to Cartesian coordinates
            const x = Math.cos(randomAngle) * randomRadius + 600; // Center of 1200px galaxy
            const y = Math.sin(randomAngle) * randomRadius + 600;
            
            // Random size
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            
            // Random color (white, blue, yellow)
            const colors = ['#ffffff', '#4FC3F7', '#FFD700'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            star.style.background = randomColor;
            star.style.boxShadow = `0 0 ${size * 3}px ${randomColor}`;
            
            // Random animation delay
            star.style.animationDelay = Math.random() * 3 + 's';
            
            arm.appendChild(star);
        }

        function createParticle(container) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            // Random size
            const size = Math.random() * 2 + 0.5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            
            // Random position
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            
            // Random animation delay
            particle.style.animationDelay = Math.random() * 20 + 's';
            
            // Random animation duration
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            
            container.appendChild(particle);
        }
        
        function createRegularStar(container) {
            const star = document.createElement('div');
            star.className = 'star white';
            
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            
            container.appendChild(star);
            animateStar(star);
        }
        
        function createColoredStar(container) {
            const star = document.createElement('div');
            const colors = ['blue', 'yellow', 'red'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            star.className = 'star ' + randomColor;
            
            const size = Math.random() * 2 + 2;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            
            container.appendChild(star);
            animateStar(star);
        }
        
        function createPulsingStar(container) {
            const star = document.createElement('div');
            star.className = 'pulsing-star';
            
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            
            container.appendChild(star);
        }
        
        function createShootingStar(container) {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            
            // Random starting position
            const startX = Math.random() * 100;
            const startY = Math.random() * 50;
            
            shootingStar.style.left = startX + '%';
            shootingStar.style.top = startY + '%';
            
            container.appendChild(shootingStar);
            
            // Remove shooting star after animation
            setTimeout(() => {
                shootingStar.remove();
            }, 3000);
        }
        
        function animateStar(star) {
            let position = parseFloat(star.style.top);
            const speed = Math.random() * 0.3 + 0.05;
            
            function move() {
                position -= speed;
                star.style.top = position + '%';
                
                if (position < -5) {
                    position = 105;
                    star.style.top = position + '%';
                    star.style.left = Math.random() * 100 + '%';
                }
                
                requestAnimationFrame(move);
            }
            
            move();
        }
        
        // Initialize all effects when page loads
        window.addEventListener('load', function() {
            createStars();
            createParticles();
            create3DGalaxy();
        });
        
        // Recreate effects on window resize
        window.addEventListener('resize', function() {
            createStars();
            createParticles();
            create3DGalaxy();
        });
    </script>
</body>
</html>
